<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Integration</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #1e1e24;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-container {
            width: 450px;
            max-width: 95%;
            height: 650px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #6200ee;
            color: white;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #f7f9fb;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .bot-message {
            background: #e3f2fd;
            color: #0d47a1;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .user-message {
            background: #6200ee;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* Loading Dots Animation */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #e9ecef;
            align-self: flex-start;
            border-radius: 18px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #777;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: #ffffff;
            border-top: 1px solid #eee;
        }

        #user-input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
            font-size: 0.95rem;
        }

        #user-input:focus {
            border-color: #6200ee;
        }

        #send-btn {
            background: #6200ee;
            color: white;
            border: none;
            padding: 0 22px;
            margin-left: 10px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #4700b3;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">Gemini AI Assistant</div>
        
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">Hello! I am an AI chatbot connected to Gemini. Ask me anything!</div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask Gemini something..." autocomplete="off">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
